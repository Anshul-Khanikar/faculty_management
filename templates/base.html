<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Faculty Database{% endblock %}</title>
    <!-- Professional Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;        /* Deep premium dark background */
            --card-bg: #151d30;         /* Slate blue card background */
            --card-border: #232e48;     /* Border for cards and tables */
            --text-primary: #f1f5f9;    /* Light text color */
            --text-secondary: #94a3b8;  /* Muted text color */
            --accent-primary: #4f46e5;  /* Indigo primary */
            --accent-hover: #4338ca;    /* Hover indigo */
            --danger-color: #ef4444;    /* Red for delete actions */
            --danger-hover: #dc2626;
            --success-color: #10b981;   /* Emerald green for success notifications */
            --font-family: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.5;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        /* Header Area */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--card-border);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        h1 span {
            color: #818cf8; /* Light Indigo */
        }

        .nav-btn {
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            color: var(--text-primary);
            border-color: var(--text-primary);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Flash Alerts */
        .alerts-container {
            width: 100%;
            max-width: 1100px;
            margin-bottom: 1.5rem;
        }

        .alert {
            background-color: rgba(79, 70, 229, 0.15);
            border: 1px solid rgba(79, 70, 229, 0.4);
            color: var(--text-primary);
            padding: 0.85rem;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
        }

        /* Generic Forms Styling */
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.65rem 0.85rem;
            background-color: rgba(11, 15, 25, 0.8);
            border: 1px solid var(--card-border);
            border-radius: 0.375rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #818cf8;
        }

        /* Buttons */
        .btn {
            background-color: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.65rem 1.25rem;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 0.25rem;
        }

        .btn-danger {
            background-color: var(--danger-color);
        }

        .btn-danger:hover {
            background-color: var(--danger-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Forms Layout Grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem 1.25rem;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alerts-container">
                {% for message in messages %}
                    <div class="alert">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
